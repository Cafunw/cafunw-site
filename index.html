            <div id="spotify-card" class="spotify-card" style="display: none;">
                
                <div class="spotify-row">
                    <div class="spotify-art-container">
                        <img id="spotify-art" src="" alt="Album Art" class="spotify-art">
                    </div>
                    
                    <div class="spotify-info">
                        <div class="spotify-title" id="spotify-title">Not Playing</div>
                        <div class="spotify-artist" id="spotify-artist">Unknown Artist</div>
                    </div>

                    <div class="spotify-progress-bar">

                    </div>
                    <div class="spotify-time">
