<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>malaphe - Gradient Geçişli</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial Black', 'Arial Bold', sans-serif;
        }
        
        .gradient-text {
            font-size: 15vw;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 5px;
            
            /* Gradient efekti */
            background: linear-gradient(45deg, 
                #ff0000, #ff9900, #ffff00, #00ff00, 
                #00ffff, #0000ff, #9900ff, #ff00ff);
            background-size: 400% 400%;
            
            /* Metne gradient uygula */
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* Animasyon */
            animation: gradient-flow 8s ease infinite, 
                       pulse 3s ease-in-out infinite alternate;
            
            /* Gölge efekti */
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }
        
        /* Gradient animasyonu */
        @keyframes gradient-flow {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        
        /* Nabız atışı efekti */
        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(1.05);
                opacity: 0.9;
            }
        }
        
        /* Mobil için boyut ayarı */
        @media (max-width: 768px) {
            .gradient-text {
                font-size: 20vw;
                letter-spacing: 3px;
            }
        }
        
        /* Çok küçük ekranlar için */
        @media (max-width: 480px) {
            .gradient-text {
                font-size: 25vw;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>
    <div class="gradient-text">malaphe</div>
    
    <script>
        // Gradient renklerini rastgele değiştirmek için
        const gradientText = document.querySelector('.gradient-text');
        const colorSets = [
            // Kırmızı-turuncu-sarı
            ["#ff0000", "#ff9900", "#ffff00"],
            // Mavi-mor-pembe
            ["#0000ff", "#9900ff", "#ff00ff"],
            // Yeşil-turkuaz-mavi
            ["#00ff00", "#00ffff", "#0000ff"],
            // Pembe-kırmızı-turuncu
            ["#ff00ff", "#ff0000", "#ff9900"],
            // Mor-mavi-yeşil
            ["#9900ff", "#0000ff", "#00ff00"],
            // Turkuaz-yeşil-sarı
            ["#00ffff", "#00ff00", "#ffff00"]
        ];
        
        let currentSet = 0;
        
        // Her 10 saniyede bir renk setini değiştir
        setInterval(() => {
            currentSet = (currentSet + 1) % colorSets.length;
            const colors = colorSets[currentSet];
            
            // Gradient'i güncelle
            gradientText.style.background = `linear-gradient(45deg, 
                ${colors[0]}, ${colors[1]}, ${colors[2]})`;
            gradientText.style.backgroundSize = '400% 400%';
            
            // Animasyonu sıfırla
            gradientText.style.animation = 'none';
            setTimeout(() => {
                gradientText.style.animation = 'gradient-flow 8s ease infinite, pulse 3s ease-in-out infinite alternate';
            }, 10);
        }, 10000);
        
        // Tıklanınca da renk değiştir
        gradientText.addEventListener('click', () => {
            currentSet = (currentSet + 1) % colorSets.length;
            const colors = colorSets[currentSet];
            
            gradientText.style.background = `linear-gradient(45deg, 
                ${colors[0]}, ${colors[1]}, ${colors[2]})`;
            gradientText.style.backgroundSize = '400% 400%';
            
            // Animasyonu sıfırla
            gradientText.style.animation = 'none';
            setTimeout(() => {
                gradientText.style.animation = 'gradient-flow 8s ease infinite, pulse 3s ease-in-out infinite alternate';
            }, 10);
        });
        
        // Fare hareketiyle gradient yönünü değiştir
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            // Açıyı fare pozisyonuna göre ayarla (0-360 derece)
            const angle = x * 360;
            gradientText.style.background = `linear-gradient(${angle}deg, 
                #ff0000, #ff9900, #ffff00, #00ff00, 
                #00ffff, #0000ff, #9900ff, #ff00ff)`;
            gradientText.style.backgroundSize = '400% 400%';
        });
    </script>
</body>
</html>
